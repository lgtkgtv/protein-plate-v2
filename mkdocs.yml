site_name: ProteinPlate
site_description: >-
  A free, open guide to high-protein, lower-calorie Indian home meals —
  annotated plates, family-of-4 recipes, batch-cooking plans, grocery lists,
  and a keto chapter. Built for public good.
site_url: https://lgtkgtv.github.io/protein-plate-v2/
repo_url: https://github.com/lgtkgtv/protein-plate-v2
repo_name: lgtkgtv/protein-plate-v2

theme:
  name: material
  palette:
    - scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.top
    - content.code.copy

plugins:
  - search
  - gen-files:
      scripts:
        - docs/gen_pages.py   # generates recipes / ingredients / grocery-list / meal-plan

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - pymdownx.tasklist:        # renders the grocery "- [ ]" as real checkboxes
      custom_checkbox: true
  - pymdownx.superfences

nav:
  - Home: index.md
  - The Plate: the-plate.md
  - Ingredients & Portions: ingredients.md      # generated
  - Recipes: recipes.md                          # generated
  - 7-Day Meal Plan: meal-plan.md                # generated
  - Grocery List: grocery-list.md                # generated
  - Keto Chapter: keto.md
  - About & Health Note: about.md
