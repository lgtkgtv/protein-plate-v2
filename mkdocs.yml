site_name: ProteinPlate
site_description: >-
  A free, open guide to high-protein, lower-calorie Indian home meals —
  annotated plates, family-of-4 recipes, batch-cooking plans, grocery lists,
  and a keto chapter. Built for public good.
site_url: https://lgtkgtv.github.io/protein-plate-v2/
site_author: ProteinPlate contributors
repo_url: https://github.com/lgtkgtv/protein-plate-v2
repo_name: lgtkgtv/protein-plate-v2
copyright: >-
  Content licensed CC BY 4.0 · Code licensed MIT. Educational use only — not medical advice.

theme:
  name: material
  custom_dir: overrides
  icon:
    logo: material/silverware-fork-knife
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.footer
    - content.code.copy
    - toc.follow
    - search.suggest
    - search.highlight

plugins:
  - search
  - gen-files:
      scripts:
        - docs/gen_pages.py   # generates recipes / ingredients / grocery-list / meal-plan

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - tables
  - attr_list
  - md_in_html
  - pymdownx.tasklist:        # renders the grocery "- [ ]" as real checkboxes
      custom_checkbox: true
      clickable_checkbox: true   # let readers tick items in the browser
  - toc:
      permalink: true

extra_css:
  - assets/css/extra.css

extra_javascript:
  - assets/js/serving-scaler.js
  - assets/js/grocery-checklist.js
  - assets/js/pwa.js

nav:
  - Home: index.md
  - The Plate: the-plate.md
  - Ingredients & Portions: ingredients.md      # generated
  - Recipes: recipes.md                          # generated
  - 7-Day Meal Plan: meal-plan.md                # generated
  - Grocery List: grocery-list.md                # generated
  - Keto Chapter: keto.md
  - About & Health Note: about.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/lgtkgtv/protein-plate-v2
