- item: amchur
  qty: 0.5
  unit: tsp
  scale: false
- item: oil
  qty: 2
  unit: tbsp
- item: salt
  qty: null
  unit: to_taste
  scale: false
- item: coriander-fresh
  qty: 2
  unit: tbsp
  prep: chopped
  optional: true
- item: water
  qty: 1
  unit: cup
  scale: false
steps:
- Saute onion till deep golden; add ginger-garlic, then tomato puree + spices; cook
  till oil separates.
- Add chickpeas + 1 cup water; simmer 10-15 min; mash a few to thicken.
- Finish with garam masala, amchur and coriander.
storage:
  fridge_days: 5
  freezer_days: 30
  note: null
media:
