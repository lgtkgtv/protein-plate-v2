name: Deploy site

on:
  push:
    branches: [main]

permissions:
  contents: write

env:
  DISABLE_MKDOCS_2_WARNING: "true"
  NO_MKDOCS_2_WARNING: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --locked
      - run: uv run python scripts/validate.py     # don't deploy invalid data
      - run: uv run mkdocs gh-deploy --force --no-history
