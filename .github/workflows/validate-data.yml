name: Validate recipe data

on:
  push:
    paths:
      - "data/**"
      - "schema/**"
      - "scripts/validate.py"
      - "proteinplate/**"
      - "pyproject.toml"
      - "uv.lock"
  pull_request:
    paths:
      - "data/**"
      - "schema/**"
      - "scripts/validate.py"
      - "proteinplate/**"
      - "pyproject.toml"
      - "uv.lock"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --locked
      - run: uv run python scripts/validate.py
      - run: uv run python tests/test_grocery_units.py
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Grocery JS<->Python parity
        run: |
          uv run python tests/gen_parity.py
          node tests/grocery_parity.mjs
